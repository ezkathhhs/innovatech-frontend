name: CI/CD Frontend Innovatech

# 1. Trigger: Se activa SOLO al hacer push a la rama 'deploy' (Requisito de la pauta)
on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v3

      # Paso 2: Autenticación en Docker Hub usando GitHub Secrets
      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Paso 3: Build y Push de la imagen
      - name: Build y Push a Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

      # Paso 4: Conexión SSH a la EC2 Pública y Despliegue
      - name: Despliegue en AWS EC2 (Frontend)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_FRONT_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
            docker stop innovatech-frontend || true
            docker rm innovatech-frontend || true
            # Ejecutamos el contenedor mapeando el puerto 80
            docker run -d --name innovatech-frontend -p 80:8080 ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest